<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>Moja kolekcja gier</title>

<style>
body {
  font-family: Arial;
  background: #f4f4f4;
  padding: 20px;
}

h1 {
  text-align: center;
}

.container {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
  gap: 20px;
}

.card {
  background: white;
  border-radius: 10px;
  padding: 10px;
  cursor: pointer;
  box-shadow: 0 0 10px rgba(0,0,0,0.1);
  text-align: center;
}

.card img {
  width: 100%;
  height: 200px;
  object-fit: cover;
  border-radius: 10px;
  margin-bottom: 10px;
}

.details {
  font-size: 14px;
  margin-top: 5px;
}

button {
  margin-top: 10px;
  padding: 5px 10px;
  border: none;
  background: #007bff;
  color: white;
  border-radius: 5px;
  cursor: pointer;
}

button:hover {
  background: #0056b3;
}
</style>
</head>

<body>

<h1>🎲 Moja kolekcja gier</h1>

<div class="container">

  <!-- GRA 1 -->
  <div class="card">
    <img src="https://cf.geekdo-images.com/0XODRpReiZBFUffEcqT5-Q__itemrep/img/6Jf5G-bSvdOIMUSwxsJfZXl29B8=/fit-in/246x300/filters:strip_icc()/pic9156909.png">
    <h3>Catan</h3>
    <div class="details">
      👥 Gracze: 3–4<br>
      ⏱️ Czas: 60–90 min<br>
      🎂 Wiek: 10+
    </div>
    <button onclick="window.open('https://example.com/catan-instructions', '_blank')">Skrót zasad</button>
  </div>

  <!-- GRA 2 -->
  <div class="card">
    <img src="https://cf.geekdo-images.com/peUgu3A20LRmAXAMyDQfpQ__itemrep/img/6TWoEvnQQe_sO--6WLd_PQOnEQg=/fit-in/246x300/filters:strip_icc()/pic8621446.jpg">
    <h3>Carcassonne</h3>
    <div class="details">
      👥 Gracze: 2–5<br>
      ⏱️ Czas: 30–45 min<br>
      🎂 Wiek: 7+
    </div>
    <button onclick="window.open('https://example.com/carcassonne-instructions', '_blank')">Skrót zasad</button>
  </div>

</div>

</body>
</html>
