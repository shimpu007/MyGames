<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>Moja kolekcja gier</title>

<style>
body {
  font-family: Arial;
  background: #f4f4f4;
  padding: 20px;
}

h1 {
  text-align: center;
}

.container {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
  gap: 20px;
}

.card {
  background: white;
  border-radius: 10px;
  padding: 10px;
  box-shadow: 0 0 10px rgba(0,0,0,0.1);
  text-align: center;
}

.card img {
  width: 100%;
  height: 200px;
  object-fit: cover;
  border-radius: 10px;
  margin-bottom: 10px;
}

.details {
  font-size: 14px;
  margin-top: 5px;
}

button {
  margin-top: 10px;
  padding: 5px 10px;
  border: none;
  background: #007bff;
  color: white;
  border-radius: 5px;
  cursor: pointer;
}

button:hover {
  background: #0056b3;
}

/* Popup modal */
.modal {
  display: none; 
  position: fixed; 
  z-index: 1000; 
  left: 0;
  top: 0;
  width: 100%; 
  height: 100%; 
  overflow: auto; 
  background-color: rgba(0,0,0,0.5); 
}

.modal-content {
  background-color: white;
  margin: 10% auto; 
  padding: 20px;
  border-radius: 10px;
  width: 80%;
  max-width: 400px;
  text-align: left;
  box-shadow: 0 5px 15px rgba(0,0,0,0.3);
}

.close {
  color: #aaa;
  float: right;
  font-size: 24px;
  font-weight: bold;
  cursor: pointer;
}

.close:hover {
  color: black;
}
</style>
</head>

<body>

<h1>🎲 Moja kolekcja gier</h1>

<div class="container">

  <!-- GRA 1 -->
  <div class="card">
    <img src="https://upload.wikimedia.org/wikipedia/en/b/b0/Catan-2015-boxart.jpg">
    <h3>Catan</h3>
    <div class="details">
      👥 Gracze: 3–4<br>
      ⏱️ Czas: 60–90 min<br>
      🎂 Wiek: 10+
    </div>
    <button onclick="openModal('catan')">Skrót zasad</button>
  </div>

  <!-- GRA 2 -->
  <div class="card">
    <img src="https://upload.wikimedia.org/wikipedia/en/7/70/Carcassonne-game.jpg">
    <h3>Carcassonne</h3>
    <div class="details">
      👥 Gracze: 2–5<br>
      ⏱️ Czas: 30–45 min<br>
      🎂 Wiek: 7+
    </div>
    <button onclick="openModal('carcassonne')">Skrót zasad</button>
  </div>

</div>

<!-- Modale -->
<div id="modal-catan" class="modal">
  <div class="modal-content">
    <span class="close" onclick="closeModal('catan')">&times;</span>
    <h3>Catan - Skrót zasad</h3>
    <p>Buduj osady, zbieraj surowce i handluj.</p>
  </div>
</div>

<div id="modal-carcassonne" class="modal">
  <div class="modal-content">
    <span class="close" onclick="closeModal('carcassonne')">&times;</span>
    <h3>Carcassonne - Skrót zasad</h3>
    <p>Układaj kafelki i zdobywaj punkty.</p>
  </div>
</div>

<script>
function openModal(game) {
  document.getElementById('modal-' + game).style.display = 'block';
}

function closeModal(game) {
  document.getElementById('modal-' + game).style.display = 'none';
}

// Zamknięcie kliknięciem poza okno modal
window.onclick = function(event) {
  if(event.target.classList.contains('modal')) {
    event.target.style.display = 'none';
  }
}
</script>

</body>
</html>
